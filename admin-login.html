<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración · Stratton Dental Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/customer-area.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="admin-login-page">

<a href="index.html" class="login-back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M19 12H5M12 5l-7 7 7 7"/>
  </svg>
  Volver al inicio
</a>

<div class="admin-login-card">
  <div class="admin-badge">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    Panel de administración
  </div>

  <h1 class="login-heading">Acceso<br/><em>restringido.</em></h1>
  <p class="login-sub">Solo para personal del laboratorio Stratton Dental Studios.</p>

  <div class="login-error" id="adminLoginError" style="display:none;margin-bottom:18px">
    Contraseña incorrecta. Inténtelo de nuevo.
  </div>

  <form class="login-form" id="adminLoginForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="adminPass">Contraseña de administrador</label>
      <input type="password" id="adminPass" name="password" class="form-input"
             placeholder="••••••••••••" autocomplete="current-password" required />
    </div>
    <button type="submit" class="login-btn" style="margin-top:8px">
      <span id="adminLoginBtnText">Acceder</span>
    </button>
  </form>

  <div class="login-demo" style="margin-top:28px">
    <strong>Contraseña de demo</strong><br/>
    <strong>stratton_admin_2024</strong>
  </div>
</div>

<script src="assets/js/admin.js"></script>
<script>Admin.initLogin();</script>
</body>
</html>
